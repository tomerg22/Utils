name: topological_sort
difficulty: medium
entry_point: topological_sort
weight: 1.0
prompt: |
  Write a Python function `topological_sort(num_nodes, edges)`.
  - Nodes are integers 0..num_nodes-1.
  - `edges` is a list of (u, v) meaning u -> v.
  - Return a valid topological ordering as a list of all nodes.
  - If a cycle exists, return None.
  - Briefly explain the approach (Kahn's or DFS) and complexity.
  Respond with a single Python code block followed by a short explanation.
reasoning_rubric:
  - cycle_detection_explained
  - indegree_or_dfs_coloring_approach
  - complexity_linear_in_v_plus_e
  - disconnected_graph_handled
  - edge_case_empty_or_single_node
